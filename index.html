<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>My Shop</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  display: flex;
}

/* SIDEBAR FILTRI */
.sidebar {
  width: 220px;
  background: white;
  padding: 15px;
  height: 100vh;
}

.sidebar h3 {
  margin-top: 0;
}

.sidebar button {
  display: block;
  margin: 5px 0;
  width: 100%;
  padding: 8px;
  border: none;
  cursor: pointer;
  background: #eee;
}

.sidebar button:hover {
  background: #ddd;
}

/* AREA PRODOTTI */
.products {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.price {
  color: green;
  font-weight: bold;
}

input {
  width: 90%;
  padding: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <h1>🛒 My Smart Shop</h1>
  <input type="text" id="search" placeholder="Cerca prodotti...">
</header>

<div class="container">

<!-- FILTRI -->
<div class="sidebar">
  <h3>Filtri</h3>
  <button onclick="filter('all')">Tutti</button>
  <button onclick="filter('felpa')">Felpe</button>
  <button onclick="filter('tshirt')">T-shirt</button>
  <button onclick="filter('jeans')">Jeans</button>
</div>

<!-- PRODOTTI -->
<div class="products" id="productList">

  <div class="card" data-name="felpa nera" data-category="felpa">
    <img src="https://via.placeholder.com/300x300">
    <h3>Felpa Nera</h3>
    <p class="price">25€</p>
  </div>

  <div class="card" data-name="felpa bianca" data-category="felpa">
    <img src="https://via.placeholder.com/300x300">
    <h3>Felpa Bianca</h3>
    <p class="price">30€</p>
  </div>

  <div class="card" data-name="tshirt bianca" data-category="tshirt">
    <img src="https://via.placeholder.com/300x300">
    <h3>T-shirt Bianca</h3>
    <p class="price">15€</p>
  </div>

  <div class="card" data-name="jeans blu" data-category="jeans">
    <img src="https://via.placeholder.com/300x300">
    <h3>Jeans Blu</h3>
    <p class="price">40€</p>
  </div>

</div>
</div>

<script>

// 🔎 SEARCH
document.getElementById("search").addEventListener("input", function() {
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.getAttribute("data-name");
    card.style.display = name.includes(value) ? "block" : "none";
  });
});

// 🎯 FILTER
function filter(category) {
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let cat = card.getAttribute("data-category");
    card.style.display = (category === "all" || cat === category) ? "block" : "none";
  });
}

</script>

</body>
</html>
