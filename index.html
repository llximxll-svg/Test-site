<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>My Clothing Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: white;
      width: 220px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      margin: 10px;
      padding: 10px;
      width: 80%;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>🛍 My Clothing Store</h1>
  <p>Vestiti moderni a buon prezzo</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300x400" alt="">
    <h3>Felpa Nera</h3>
    <p class="price">25€</p>
    <button onclick="buy('Felpa Nera')">Compra</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x400" alt="">
    <h3>T-shirt Bianca</h3>
    <p class="price">15€</p>
    <button onclick="buy('T-shirt Bianca')">Compra</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x400" alt="">
    <h3>Jeans</h3>
    <p class="price">40€</p>
    <button onclick="buy('Jeans')">Compra</button>
  </div>

</div>

<footer>
  © 2026 My Clothing Store
</footer>

<script>
  function buy(product) {
    alert("Hai selezionato: " + product + " 🛒");
  }
</script>

</body>
</html>
